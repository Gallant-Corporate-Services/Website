<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
[data-navroot] *{box-sizing:border-box}
[data-navroot] a{color:inherit;text-decoration:none}
[data-navroot] :focus-visible{outline:2px solid #111013;outline-offset:3px}
@media(max-width:980px){[data-navlinks]{display:none!important}[data-menu-btn]{display:flex!important}}
@media(max-width:420px){[data-wordmark]{font-size:17px!important}[data-lion]{height:34px!important}}
@media(prefers-reduced-motion:reduce){[data-navroot] *{transition-duration:.001ms!important}}
</style>
</helmet>

<div data-navroot style="font-family:'Archivo',system-ui,sans-serif">
<nav data-navbar aria-label="Primary" style="position:fixed;top:0;left:0;width:100%;z-index:200;display:flex;align-items:center;justify-content:space-between;gap:24px;padding:0 clamp(18px,5vw,72px);height:76px;border-bottom:1px solid transparent;background:transparent;transition:background .35s ease,border-color .35s ease">
  <a href="Gallant Home.dc.html" aria-label="Gallant — home" style="display:flex;align-items:center;gap:12px;flex:none">
    <img data-lion src="assets/gallant-lion-ink.png" alt="Gallant lion mark" style="height:42px;width:auto;display:block">
    <span data-wordmark style="font-family:'Archivo',sans-serif;font-stretch:122%;font-weight:700;font-size:21px;letter-spacing:-.015em;color:#111013;line-height:1">Gallant</span>
  </a>
  <div data-navlinks style="display:flex;align-items:center;gap:clamp(20px,2.6vw,42px)">
    <a data-page="group" href="Gallant Group.dc.html" style="position:relative;color:#6F6D71;padding:8px 0;font-size:14px;font-weight:480;letter-spacing:.01em;transition:color .3s ease">Group<span data-ul style="position:absolute;left:0;bottom:2px;width:100%;height:2px;background:linear-gradient(90deg,#F7941D,#ED1E79);transform:scaleX(0);transform-origin:left;transition:transform .3s ease"></span></a>
    <a data-page="services" href="Gallant Services.dc.html" style="position:relative;color:#6F6D71;padding:8px 0;font-size:14px;font-weight:480;letter-spacing:.01em;transition:color .3s ease">Services<span data-ul style="position:absolute;left:0;bottom:2px;width:100%;height:2px;background:linear-gradient(90deg,#F7941D,#ED1E79);transform:scaleX(0);transform-origin:left;transition:transform .3s ease"></span></a>
    <a data-page="divisions" href="Gallant Divisions.dc.html" style="position:relative;color:#6F6D71;padding:8px 0;font-size:14px;font-weight:480;letter-spacing:.01em;transition:color .3s ease">Divisions<span data-ul style="position:absolute;left:0;bottom:2px;width:100%;height:2px;background:linear-gradient(90deg,#F7941D,#ED1E79);transform:scaleX(0);transform-origin:left;transition:transform .3s ease"></span></a>
    <a data-page="clients" href="Gallant Clients.dc.html" style="position:relative;color:#6F6D71;padding:8px 0;font-size:14px;font-weight:480;letter-spacing:.01em;transition:color .3s ease">Clients<span data-ul style="position:absolute;left:0;bottom:2px;width:100%;height:2px;background:linear-gradient(90deg,#F7941D,#ED1E79);transform:scaleX(0);transform-origin:left;transition:transform .3s ease"></span></a>
    <a data-page="compliance" href="Gallant Compliance.dc.html" style="position:relative;color:#6F6D71;padding:8px 0;font-size:14px;font-weight:480;letter-spacing:.01em;transition:color .3s ease">Compliance<span data-ul style="position:absolute;left:0;bottom:2px;width:100%;height:2px;background:linear-gradient(90deg,#F7941D,#ED1E79);transform:scaleX(0);transform-origin:left;transition:transform .3s ease"></span></a>
    <a data-page="contact" href="Gallant Contact.dc.html" style="position:relative;font-size:14px;font-weight:560;color:#111013;padding:8px 0;margin-left:8px">Request a proposal<span style="position:absolute;left:0;bottom:2px;width:100%;height:2px;background:linear-gradient(90deg,#F7941D,#ED1E79)"></span></a>
  </div>
  <button data-menu-btn aria-label="Open menu" style="display:none;flex-direction:column;justify-content:center;align-items:flex-end;gap:6px;width:44px;height:44px;background:none;border:none;cursor:pointer;padding:0;flex:none">
    <span style="display:block;width:26px;height:2px;background:#111013"></span>
    <span style="display:block;width:18px;height:2px;background:linear-gradient(90deg,#F7941D,#ED1E79)"></span>
  </button>
</nav>

<div data-menu style="position:fixed;inset:0;z-index:290;background:#FAF9F7;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:2px;opacity:0;visibility:hidden;transition:opacity .35s ease,visibility .35s ease;padding:0 24px">
  <button data-menu-close aria-label="Close menu" style="position:absolute;top:14px;right:clamp(16px,4.4vw,64px);width:48px;height:48px;background:none;border:none;font-family:'Archivo',sans-serif;font-size:36px;font-weight:300;line-height:1;color:#111013;cursor:pointer">×</button>
  <img src="assets/gallant-lion-ink.png" alt="" style="height:52px;width:auto;margin-bottom:30px">
  <a data-mpage="group" href="Gallant Group.dc.html" style="font-family:'Archivo',sans-serif;font-stretch:120%;font-weight:640;font-size:clamp(28px,7vw,42px);letter-spacing:-.02em;color:#111013;padding:9px 0">Group</a>
  <a data-mpage="services" href="Gallant Services.dc.html" style="font-family:'Archivo',sans-serif;font-stretch:120%;font-weight:640;font-size:clamp(28px,7vw,42px);letter-spacing:-.02em;color:#111013;padding:9px 0">Services</a>
  <a data-mpage="divisions" href="Gallant Divisions.dc.html" style="font-family:'Archivo',sans-serif;font-stretch:120%;font-weight:640;font-size:clamp(28px,7vw,42px);letter-spacing:-.02em;color:#111013;padding:9px 0">Divisions</a>
  <a data-mpage="clients" href="Gallant Clients.dc.html" style="font-family:'Archivo',sans-serif;font-stretch:120%;font-weight:640;font-size:clamp(28px,7vw,42px);letter-spacing:-.02em;color:#111013;padding:9px 0">Clients</a>
  <a data-mpage="compliance" href="Gallant Compliance.dc.html" style="font-family:'Archivo',sans-serif;font-stretch:120%;font-weight:640;font-size:clamp(28px,7vw,42px);letter-spacing:-.02em;color:#111013;padding:9px 0">Compliance</a>
  <a data-mpage="contact" href="Gallant Contact.dc.html" style="margin-top:26px;position:relative;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:#111013;padding-bottom:7px">Request a proposal →<span style="position:absolute;left:0;bottom:0;width:100%;height:2px;background:linear-gradient(90deg,#F7941D,#ED1E79)"></span></a>
</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;76px&quot;},&quot;active&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  componentDidMount() {
    const active = this.props.active || '';
    document.querySelectorAll('[data-page]').forEach(l => {
      const ul = l.querySelector('[data-ul]');
      if (l.getAttribute('data-page') === active) {
        l.style.color = '#111013'; l.style.fontWeight = '560';
        if (ul) ul.style.transform = 'scaleX(1)';
      } else if (ul) {
        l.addEventListener('mouseenter', () => { ul.style.transform = 'scaleX(1)'; l.style.color = '#111013'; });
        l.addEventListener('mouseleave', () => { ul.style.transform = 'scaleX(0)'; l.style.color = '#6F6D71'; });
      }
    });
    document.querySelectorAll('[data-mpage]').forEach(l => {
      if (l.getAttribute('data-mpage') === active) {
        l.style.borderBottom = '3px solid';
        l.style.borderImage = 'linear-gradient(90deg,#F7941D,#ED1E79) 1';
      }
    });
    const nav = document.querySelector('[data-navbar]');
    let ticking = false;
    const onScroll = () => {
      if (ticking) return; ticking = true;
      requestAnimationFrame(() => {
        const y = window.scrollY;
        if (y > 24) { nav.style.background = 'rgba(250,249,247,0.9)'; nav.style.backdropFilter = 'saturate(160%) blur(14px)'; nav.style.webkitBackdropFilter = 'saturate(160%) blur(14px)'; nav.style.borderBottomColor = '#E3E1DD'; nav.style.height = '64px'; }
        else { nav.style.background = 'transparent'; nav.style.backdropFilter = 'none'; nav.style.webkitBackdropFilter = 'none'; nav.style.borderBottomColor = 'transparent'; nav.style.height = '76px'; }
        ticking = false;
      });
    };
    nav.style.transition = 'background .35s ease,border-color .35s ease,height .35s ease';
    window.addEventListener('scroll', onScroll, { passive: true });
    this._onScroll = onScroll; onScroll();
    const menu = document.querySelector('[data-menu]');
    const openM = () => { menu.style.opacity = '1'; menu.style.visibility = 'visible'; };
    const closeM = () => { menu.style.opacity = '0'; menu.style.visibility = 'hidden'; };
    const btn = document.querySelector('[data-menu-btn]');
    const cl = document.querySelector('[data-menu-close]');
    if (btn) btn.addEventListener('click', openM);
    if (cl) cl.addEventListener('click', closeM);
    document.querySelectorAll('[data-mpage]').forEach(l => l.addEventListener('click', closeM));
  }
  componentWillUnmount() { if (this._onScroll) window.removeEventListener('scroll', this._onScroll); }
  renderVals() { return {}; }
}
</script>
</body>
</html>
